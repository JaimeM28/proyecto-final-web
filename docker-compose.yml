services:
  # Contenedor de Base de Datos
  postgres_db:
    image: postgres:15-alpine
    container_name: nestjs_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Contenedor de la API NestJS
  api:
    build:
      context: ./backend # <--- Apunta a la carpeta backend
      dockerfile: Dockerfile
    container_name: nestjs_api
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      # Estas son las que leerá tu TypeOrmModule.forRootAsync
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      - postgres_db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data: